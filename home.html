<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>4v4WarsWatcher - チーム設定</title>
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>
  <!-- カスタムタイトルバー -->
  <div id="title-bar">
    <div id="title-bar-drag">
      <img src="img/icons/icon_23.png" class="title-icon" alt="" />
      <span class="title-text">4v4 Wars Watcher</span>
    </div>
    <div id="title-bar-controls">
      <button id="btn-settings" onclick="openSettings()" title="ワーカー設定">&#x2699;</button>
      <button id="btn-minimize" onclick="minimizeWindow()" title="最小化">&#x2012;</button>
      <button id="btn-close" onclick="closeWindow()" title="閉じる">&#x2715;</button>
    </div>
  </div>

  <div id="app">
    <header>
      <h1>4v4 Wars Watcher</h1>
      <p class="subtitle">チームメンバーを設定してください</p>
    </header>

    <main>
      <div class="teams-container">

        <!-- Team A -->
        <div class="team-card" id="team-a-card">
          <div class="team-header team-a">
            <input type="color" class="team-color-input" id="team-a-color" value="#4a90d9" title="チームカラー" />
            <button class="team-icon" id="team-a-icon-btn" onclick="openIconEditor('a')" title="チームアイコン">＋</button>
            <textarea class="team-name-input" id="team-a-name" rows="1" spellcheck="false">Team A</textarea>
            <button class="btn-reset" onclick="resetTeam('a')" title="Team Aをリセット">リセット</button>
          </div>
          <ul class="member-list" id="team-a-members"></ul>
          <div class="add-member-row">
            <textarea
              class="riot-id-input"
              id="team-a-input"
              rows="1"
              placeholder="RiotID#JP1"
              spellcheck="false"
            ></textarea>
            <button class="btn-add" onclick="addMember('a')">追加</button>
          </div>
        </div>

        <!-- Team B -->
        <div class="team-card" id="team-b-card">
          <div class="team-header team-b">
            <input type="color" class="team-color-input" id="team-b-color" value="#d9604a" title="チームカラー" />
            <button class="team-icon" id="team-b-icon-btn" onclick="openIconEditor('b')" title="チームアイコン">＋</button>
            <textarea class="team-name-input" id="team-b-name" rows="1" spellcheck="false">Team B</textarea>
            <button class="btn-reset" onclick="resetTeam('b')" title="Team Bをリセット">リセット</button>
          </div>
          <ul class="member-list" id="team-b-members"></ul>
          <div class="add-member-row">
            <textarea
              class="riot-id-input"
              id="team-b-input"
              rows="1"
              placeholder="RiotID#JP1"
              spellcheck="false"
            ></textarea>
            <button class="btn-add" onclick="addMember('b')">追加</button>
          </div>
        </div>

      </div>
    </main>

    <section class="assign-panel">
      <div class="assign-head">
        <div>
          <h2>プレイヤー対応（OCRが読めない時のリカバリ）</h2>
          <p class="assign-hint">各行の名前画像を見て、正しいプレイヤーを選んで「確定」してください。OCRが読めた行は自動で選択済みです。</p>
        </div>
        <button class="btn-refresh" id="assign-refresh" onclick="refreshRows()">更新</button>
      </div>
      <div id="assign-rows" class="assign-rows"></div>
      <div class="assign-foot">
        <span id="assign-msg"></span>
        <button class="btn-assign" id="assign-confirm" onclick="confirmAssign()">確定</button>
      </div>
    </section>

    <footer>
      <span id="status-msg"></span>
    </footer>
  </div>

  <!-- ワーカー設定モーダル（歯車ボタンから開く） -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-box settings-box">
      <h3>ワーカー設定</h3>
      <div class="worker-row">
        <label for="worker-dir">ワーカーフォルダ</label>
        <input type="text" id="worker-dir" spellcheck="false"
               placeholder="例: D:\projects\4v4WarsWatcher\worker" />
      </div>
      <div class="worker-row">
        <label for="worker-python">Python（任意）</label>
        <input type="text" id="worker-python" spellcheck="false" placeholder="pythonw" />
      </div>
      <div class="worker-row">
        <label for="worker-tesseract">Tesseract（任意）</label>
        <input type="text" id="worker-tesseract" spellcheck="false"
               placeholder="例: D:\Tesseract-OCR\tesseract.exe（PATHにあれば空でOK）" />
      </div>
      <p class="worker-hint">オーバーレイ起動時にこのフォルダの worker.py を自動実行します。設定は自動保存されます。</p>
      <div class="modal-actions">
        <button class="primary" onclick="closeSettings()">閉じる</button>
      </div>
    </div>
  </div>

  <!-- アイコン編集モーダル（画像アップロード→位置/拡大調整→円形トリミング） -->
  <div id="icon-editor" class="modal hidden">
    <div class="modal-box">
      <h3 id="icon-editor-title">アイコン編集</h3>
      <div class="icon-stage">
        <canvas id="icon-canvas" width="260" height="260"></canvas>
      </div>
      <div class="icon-controls">
        <button class="btn-file" onclick="document.getElementById('icon-file').click()">画像を選択</button>
        <input type="file" id="icon-file" accept="image/*" hidden />
        <label class="zoom-label">拡大
          <input type="range" id="icon-zoom" min="1" max="6" step="0.01" value="1" />
        </label>
      </div>
      <p class="modal-hint">ドラッグで移動 / スライダーで拡大。円の中がアイコンになります。</p>
      <div class="modal-actions">
        <button onclick="cancelIconEditor()">キャンセル</button>
        <button class="btn-danger" onclick="clearIcon()">アイコン削除</button>
        <button class="primary" onclick="saveIconEditor()">保存</button>
      </div>
    </div>
  </div>

  <script src="js/home.js"></script>
</body>
</html>
