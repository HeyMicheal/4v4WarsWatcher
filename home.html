<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>4v4WarsWatcher - チーム設定</title>
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>
  <!-- カスタムタイトルバー -->
  <div id="title-bar">
    <div id="title-bar-drag">
      <img src="img/icons/icon_23.png" class="title-icon" alt="" />
      <span class="title-text">4v4 Wars Watcher</span>
    </div>
    <div id="title-bar-controls">
      <button id="btn-minimize" onclick="minimizeWindow()" title="最小化">&#x2012;</button>
      <button id="btn-close" onclick="closeWindow()" title="閉じる">&#x2715;</button>
    </div>
  </div>

  <div id="app">
    <header>
      <h1>4v4 Wars Watcher</h1>
      <p class="subtitle">チームメンバーを設定してください</p>
    </header>

    <main>
      <div class="teams-container">

        <!-- Team A -->
        <div class="team-card" id="team-a-card">
          <div class="team-header team-a">
            <input type="color" class="team-color-input" id="team-a-color" value="#4a90d9" title="チームカラー" />
            <textarea class="team-name-input" id="team-a-name" rows="1" spellcheck="false">Team A</textarea>
            <button class="btn-reset" onclick="resetTeam('a')" title="Team Aをリセット">リセット</button>
          </div>
          <ul class="member-list" id="team-a-members"></ul>
          <div class="add-member-row">
            <textarea
              class="riot-id-input"
              id="team-a-input"
              rows="1"
              placeholder="RiotID#JP1"
              spellcheck="false"
            ></textarea>
            <button class="btn-add" onclick="addMember('a')">追加</button>
          </div>
        </div>

        <!-- Team B -->
        <div class="team-card" id="team-b-card">
          <div class="team-header team-b">
            <input type="color" class="team-color-input" id="team-b-color" value="#d9604a" title="チームカラー" />
            <textarea class="team-name-input" id="team-b-name" rows="1" spellcheck="false">Team B</textarea>
            <button class="btn-reset" onclick="resetTeam('b')" title="Team Bをリセット">リセット</button>
          </div>
          <ul class="member-list" id="team-b-members"></ul>
          <div class="add-member-row">
            <textarea
              class="riot-id-input"
              id="team-b-input"
              rows="1"
              placeholder="RiotID#JP1"
              spellcheck="false"
            ></textarea>
            <button class="btn-add" onclick="addMember('b')">追加</button>
          </div>
        </div>

      </div>
    </main>

    <footer>
      <span id="status-msg"></span>
    </footer>
  </div>

  <script src="js/home.js"></script>
</body>
</html>
